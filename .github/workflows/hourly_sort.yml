name: Spotify Sorter — Run horaire

on:
  schedule:
    # Chaque heure
    - cron: "0 * * * *"
  workflow_dispatch:
    # Permet de lancer manuellement depuis l'onglet Actions

jobs:
  sort:
    name: Classer les nouveaux likes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write  # nécessaire pour committer state.json + logs

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Écriture du cache Spotify (refresh token)
        run: |
          echo '${{ secrets.SPOTIFY_CACHE }}' > .spotify_cache
        # Le contenu de SPOTIFY_CACHE est le JSON généré lors de l'auth initiale

      - name: Lancer le spotify sorter
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REDIRECT_URI: ${{ secrets.SPOTIFY_REDIRECT_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          MAX_TRACKS: ${{ vars.MAX_TRACKS }}
        run: python sorter.py

      - name: Commit des fichiers mis à jour
        run: |
          git config user.name "spotify-sorter[bot]"
          git config user.email "spotify-sorter@users.noreply.github.com"
          git add state.json HISTORY.md logs/
          git diff --cached --quiet || git commit -m "chore: run $(date +'%Y-%m-%d %H:%M UTC') — mise à jour état et logs"
          git push

      - name: Notification push
        if: always()
        run: |
          STATUS="${{ job.status }}"
          LATEST_LOG=$(ls -t logs/*.md 2>/dev/null | head -1)
          if [ -n "$LATEST_LOG" ]; then
            SUMMARY=$(awk '/## Résumé/{f=1} f && /\|/{print} /## Détail/{exit}' "$LATEST_LOG" | grep -v "Métrique" | grep -v "^|[-]" | sed 's/|//g;s/^ *//;s/ *$//')
            DETAILS=$(awk '/## Détail des classifications/{f=1; next} f && /\|/{print}' "$LATEST_LOG" | grep -v "Titre" | grep -v "^|[-]" | sed 's/|/ |/g' | head -20)
          else
            SUMMARY="Aucun log disponible"
            DETAILS=""
          fi
          if [ "$STATUS" = "success" ]; then
            TITLE="Spotify Sorter OK"
            PRIORITY="default"
            TAGS="white_check_mark,spotify"
          else
            TITLE="Spotify Sorter ECHOUE"
            PRIORITY="high"
            TAGS="x,spotify"
            SUMMARY="Consulte les logs GitHub Actions."
            DETAILS=""
          fi
          printf '%s\n\n%s\n\n%s' "$(date +'%H:%M UTC')" "$SUMMARY" "$DETAILS" | curl -s \
            -H "Title: $TITLE" \
            -H "Priority: $PRIORITY" \
            -H "Tags: $TAGS" \
            --data-binary @- \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}"
