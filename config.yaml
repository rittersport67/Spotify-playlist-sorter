# ============================================================
# Spotify Sorter — Configuration des genres
# ============================================================
# Chaque genre définit :
#   keywords : mots-clés comparés aux tags Last.fm de l'artiste et du titre
#              (normalisation : minuscules, sans tirets ni espaces)
#
# Classification :
#   1. rule_based_classify() matche les tags Last.fm contre les keywords
#      → tags du titre (poids 1.0) > tags de l'artiste (poids 0.7)
#      → le genre avec le score le plus élevé et unique gagne
#   2. Si aucun match clair → fallback LLM (llama-3.1-8b-instant via Groq)
# ============================================================

genres:

  Rap FR:
    keywords:
      - french hip hop
      - french rap
      - rap français
